name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check (mypy)
        run: mypy outreach_lint

      - name: Test (pytest + coverage)
        run: pytest --cov=outreach_lint --cov-report=term-missing --cov-fail-under=90

      - name: Lint the example batch (dogfood)
        run: outreach-lint examples/templated_batch.jsonl --json > /dev/null
